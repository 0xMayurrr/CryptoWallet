            color: #e5e2e1;

</div>
</div>
<!-- Decorative element -->
<div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
</div>
</section>

<button class="pb-3 border-b-2 border-primary text-on-surface font-bold text-sm transition-all">Crypto</button>
<button class="pb-3 text-on-surface-variant/60 font-medium text-sm hover:text-on-surface transition-all">Fiat</button>

<!-- Assets List -->
<div class="space-y-4">
